<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Shooting Stars">
    <title>Shooting Stars - Soccer Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }
        
        body {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #1a1a1a;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0;
        }
        
        h1 {
            color: #FFF;
            margin-bottom: 5px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #AAA;
            margin-bottom: 10px;
            font-size: 14px;
        }
        
        canvas {
            display: block;
            max-width: 100vw;
            max-height: 100vh;
            background-color: #2d5016;
            border: 2px solid #FFF;
        }
        
        .instructions {
            position: absolute;
            bottom: 10px;
            left: 0;
            right: 0;
            text-align: center;
            color: #FFF;
            font-size: 12px;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px;
        }
        
        .instructions p {
            margin: 2px 0;
        }
        
        .touch-controls {
            position: absolute;
            bottom: 80px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            padding: 10px;
            background: rgba(0, 0, 0, 0.7);
            gap: 10px;
        }
        
        .touch-btn {
            flex: 1;
            padding: 15px;
            background-color: #FFD700;
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            -webkit-user-select: none;
            user-select: none;
        }
        
        .touch-btn:active {
            background-color: #FFC700;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚽ Shooting Stars ⚽</h1>
        <p class="subtitle">Soccer Goal Keeper Challenge</p>
        <canvas id="shootingStarsCanvas"></canvas>
        <div class="touch-controls">
            <button class="touch-btn" id="leftBtn">← LEFT</button>
            <button class="touch-btn" id="shootBtn">🎯 SHOOT</button>
            <button class="touch-btn" id="rightBtn">RIGHT →</button>
        </div>
        <div class="instructions">
            <p><strong>Touch Controls:</strong> LEFT / SHOOT / RIGHT buttons below the game</p>
            <p>Stop the soccer balls from entering the goal! Catch them for 50 points or shoot them for 10 points!</p>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
