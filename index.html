<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shooting Stars - Soccer Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>⚽ Shooting Stars ⚽</h1>
        <p class="subtitle">Soccer Goal Keeper Challenge</p>
        <canvas id="shootingStarsCanvas" width="800" height="600"></canvas>
        <div class="instructions">
            <p><strong>Controls:</strong></p>
            <p>← → Arrow keys to move | SPACEBAR to shoot</p>
            <p>Stop the soccer balls from entering the goal! Catch them with your body for 50 points or shoot them for 10 points!</p>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
