<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Pong Game</h1>
        <div class="score-board">
            <div class="score">
                <p>Player</p>
                <p id="score1">0</p>
            </div>
            <div class="score">
                <p>Computer</p>
                <p id="score2">0</p>
            </div>
        </div>
        <canvas id="pongCanvas" width="800" height="400"></canvas>
        <div class="instructions">
            <p><strong>Controls:</strong> Use UP and DOWN arrow keys to move your paddle</p>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
